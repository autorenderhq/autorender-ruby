name: Sync from production

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.repository == 'autorenderhq/autorender-ruby-staging'
    env:
      PRODUCTION_REPO: autorenderhq/autorender-ruby
    steps:
      - name: Check out staging
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch production main
        env:
          PRODUCTION_REPO_TOKEN: ${{ secrets.PRODUCTION_REPO_TOKEN }}
        run: |
          git remote add production \
            "https://x-access-token:${PRODUCTION_REPO_TOKEN}@github.com/${PRODUCTION_REPO}.git"
          git fetch production main

      - name: Check if staging is behind production
        id: check
        run: |
          MERGED=$(git merge-tree --write-tree origin/main production/main 2>/dev/null) || MERGED=conflict
          STAGING_TREE=$(git rev-parse 'origin/main^{tree}')
          if [ "$MERGED" = "$STAGING_TREE" ] || [ "$MERGED" = "conflict" ]; then
            echo "Staging is up to date with production."
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
          else
            echo "Production has commits not in staging. Back-sync needed."
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create back-sync branch and PR
        if: steps.check.outputs.needs_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b stlc/from-prod
          git merge production/main --no-edit -m "chore: sync release commits from production"
          git push origin stlc/from-prod --force

          EXISTING_PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head stlc/from-prod \
            --state open \
            --json number \
            --jq '.[0].number')
          if [ -z "${EXISTING_PR}" ]; then
            gh pr create \
              --repo "${{ github.repository }}" \
              --base main \
              --head stlc/from-prod \
              --title "chore: sync release commits from production" \
              --body "Pulls version bump and changelog commits from production back to staging so the next stlc build reseals cleanly."
          else
            echo "Back-sync PR #${EXISTING_PR} already exists."
          fi
