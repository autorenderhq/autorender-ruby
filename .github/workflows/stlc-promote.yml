name: Promote SDKs

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    if: github.repository == 'autorenderhq/autorender-ruby-staging'
    env:
      PRODUCTION_REPO: autorenderhq/autorender-ruby
      GH_TOKEN: ${{ secrets.PRODUCTION_REPO_TOKEN }}
    steps:
      - name: Check out staging
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch production main
        run: |
          git remote add production \
            "https://x-access-token:${GH_TOKEN}@github.com/${PRODUCTION_REPO}.git"
          git fetch production main

      - name: Check if production is already in sync
        id: diff
        run: |
          MERGED=$(git merge-tree --write-tree production/main origin/main 2>/dev/null) || MERGED=conflict
          PRODUCTION_TREE=$(git rev-parse 'production/main^{tree}')
          if [ "$MERGED" = "$PRODUCTION_TREE" ]; then
            echo "Production already contains staging content. Nothing to release."
            echo "synced=true" >> "$GITHUB_OUTPUT"
          else
            echo "synced=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push staging main to the release branch on production
        if: steps.diff.outputs.synced == 'false'
        run: |
          git push production origin/main:refs/heads/stainless/release --force

          # Overlay files that production owns (CHANGELOG.md, version files) so
          # stlc regeneration never causes delete-vs-modify or stale-content conflicts
          OVERLAY_FILES=""
          for f in CHANGELOG.md lib/autorender/version.rb; do
            if git ls-tree production/main -- "$f" | grep -q .; then
              PROD_BLOB=$(git ls-tree production/main -- "$f" | awk '{print $3}')
              STAGE_BLOB=$(git ls-tree origin/main -- "$f" | awk '{print $3}')
              if [ "$PROD_BLOB" != "$STAGE_BLOB" ]; then
                OVERLAY_FILES="$OVERLAY_FILES $f"
              fi
            fi
          done
          if [ -n "$OVERLAY_FILES" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b stlc-patch-release origin/main
            for f in $OVERLAY_FILES; do
              git checkout production/main -- "$f"
            done
            git commit -m "chore: preserve production-managed files"
            git push production HEAD:refs/heads/stainless/release --force
          fi

      - name: Open or update the release PR on production
        if: steps.diff.outputs.synced == 'false'
        run: |
          EXISTING_PR=$(gh pr list \
            --repo "${PRODUCTION_REPO}" \
            --head stainless/release \
            --state open \
            --json number \
            --jq '.[0].number')
          if [ -z "${EXISTING_PR}" ]; then
            gh pr create \
              --repo "${PRODUCTION_REPO}" \
              --base main \
              --head stainless/release \
              --title "Release SDK updates" \
              --body "$(git log --oneline production/main..origin/main)"
          else
            echo "Release PR #${EXISTING_PR} already exists. Force-push has updated it."
          fi
